name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Zero/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Zero
        run: pnpm install --frozen-lockfile

      - name: Format check (changed files only)
        working-directory: Zero
        run: |
          # Only check formatting on files changed in this PR
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.css' | grep '^Zero/' | sed 's|^Zero/||' || true)
          if [ -z "$CHANGED" ]; then
            echo "No formattable files changed"
            exit 0
          fi
          echo "$CHANGED" | xargs pnpm prettier --check

      - name: Lint changed files (OxLint)
        working-directory: Zero
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' | grep '^Zero/' | sed 's|^Zero/||' || true)
          if [ -z "$CHANGED" ]; then
            echo "No lintable files changed"
            exit 0
          fi
          echo "$CHANGED" | xargs pnpm dlx oxlint@latest

      - name: Lint changed files (ESLint)
        working-directory: Zero/apps/mail
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' | grep '^Zero/apps/mail/' | sed 's|^Zero/apps/mail/||' || true)
          if [ -z "$CHANGED" ]; then
            echo "No lintable files changed"
            exit 0
          fi
          echo "$CHANGED" | xargs npx eslint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Zero/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Zero
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: Zero
        run: pnpm build:frontend
        env:
          VITE_PUBLIC_BACKEND_URL: https://api.solmail.xyz
          VITE_PUBLIC_APP_URL: https://solmail.xyz

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Zero/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Zero
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: Zero
        run: pnpm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Zero/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Zero
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        working-directory: Zero
        run: pnpm audit --prod
        continue-on-error: true

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Zero/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Zero
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: Zero
        run: pnpm build:frontend
        env:
          VITE_PUBLIC_BACKEND_URL: https://api.solmail.xyz
          VITE_PUBLIC_APP_URL: https://solmail.xyz

      - name: Check bundle size
        working-directory: Zero/apps/mail
        run: |
          TOTAL=$(du -sk build/client/assets | awk '{print $1}')
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total assets | ${TOTAL} KB |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List top 10 largest files
          echo "### Largest files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find build/client/assets -type f -name '*.js' -exec du -sk {} \; | sort -rn | head -10 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Warn if total exceeds 5MB
          if [ "$TOTAL" -gt 5120 ]; then
            echo "::warning::Bundle size is ${TOTAL}KB which exceeds the 5MB threshold"
          fi

  db-migration:
    name: DB Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Zero/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Zero
        run: pnpm install --frozen-lockfile

      - name: Check for pending migrations
        working-directory: Zero/apps/server
        run: |
          # Generate migrations to see if schema is in sync
          npx drizzle-kit generate 2>&1 || true
          # Check if any new migration files were generated
          if git diff --name-only | grep -q 'migrations'; then
            echo "::warning::Schema changes detected — new migration files may be needed"
          fi

  duplicate-deps:
    name: Duplicate Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Zero/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Zero
        run: pnpm install --frozen-lockfile

      - name: Check for duplicate dependencies
        working-directory: Zero
        run: |
          echo "## Duplicate Dependencies Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DUPES=$(pnpm dedupe --check 2>&1 || true)
          if echo "$DUPES" | grep -q 'Already optimal'; then
            echo "No duplicate dependencies found." >> $GITHUB_STEP_SUMMARY
          else
            echo "Duplicate packages detected. Run \`pnpm dedupe\` to fix:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$DUPES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::Duplicate dependencies detected — run 'pnpm dedupe' to optimize"
          fi

  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(gh pr view ${{ github.event.pull_request.number }} --json additions -q '.additions')
          DELETIONS=$(gh pr view ${{ github.event.pull_request.number }} --json deletions -q '.deletions')
          TOTAL=$((ADDITIONS + DELETIONS))
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --json changedFiles -q '.changedFiles')

          echo "## PR Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines added | +${ADDITIONS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines removed | -${DELETIONS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total changes | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Files changed | ${FILES} |" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL" -gt 500 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Consider breaking this into smaller PRs for easier review." >> $GITHUB_STEP_SUMMARY
            echo "::warning::Large PR — ${TOTAL} lines changed across ${FILES} files. Consider splitting into smaller PRs."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
